<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Monitoring DPUPKP Kabupaten Sleman</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:"Segoe UI",Arial,sans-serif;
background:#111827;
}

/* HEADER */

header{

height:60px;

background:#111827;

border-bottom:3px solid #22C55E;

display:flex;

justify-content:space-between;

align-items:center;

padding:0 24px;

color:white;

}

.left{

display:flex;

flex-direction:column;

}

.title{

font-size:20px;

font-weight:bold;

}

.subtitle{

font-size:12px;

letter-spacing:3px;

color:#4ADE80;

margin-top:2px;

}

.right{

text-align:right;

}

#clock{

font-size:24px;

font-weight:bold;

}

#date{

font-size:12px;

opacity:.8;

}

/* CONTENT */

iframe{

display:block;

width:100%;

height:calc(100vh - 92px);

border:none;

background:white;

}

/* FOOTER */

footer{

height:32px;

background:#111827;

border-top:1px solid #334155;

display:flex;

justify-content:center;

align-items:center;

font-size:13px;

color:#fff;

}

.online{

color:#22C55E;

font-weight:bold;

}

</style>

</head>

<body>

<header>

<div class="left">

<div class="title">

Dashboard Monitoring DPUPKP Kabupaten Sleman

</div>

<div class="subtitle">

SIGAP MEMBANGUN SLEMAN

</div>

</div>

<div class="right">

<div id="clock"></div>

<div id="date"></div>

</div>

</header>

<iframe

src="https://docs.google.com/presentation/d/e/2PACX-1vRXPgQYuwiCNnzZnLwRpc8kwSAg6uKPUKReDhunjslbH2CAkMs7ttP_QdjsX-F-0l_pYELc5OK2PgiU/embed?start=true&loop=true&delayms=30000"

allowfullscreen>

</iframe>

<footer>

<span class="online">🟢 Dashboard Aktif</span>

&nbsp;&nbsp;|&nbsp;&nbsp;

Slide 30 Detik

&nbsp;&nbsp;|&nbsp;&nbsp;

Refresh Otomatis 15 Menit

</footer>

<script>

function updateClock(){

const now=new Date();

document.getElementById("clock").innerHTML=
now.toLocaleTimeString("id-ID")+" WIB";

document.getElementById("date").innerHTML=
now.toLocaleDateString("id-ID",{
weekday:"long",
day:"2-digit",
month:"long",
year:"numeric"
});

}

updateClock();

setInterval(updateClock,1000);

// Refresh halaman setiap 15 menit
setTimeout(function(){

location.reload();

},900000);

</script>

</body>
</html>

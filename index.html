<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Monitoring DPUPKP</title>

<!-- Anti Cache -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#111827;
font-family:"Segoe UI",Arial,sans-serif;
}

/* ================= HEADER ================= */

header{

height:58px;

background:#0F172A;

border-bottom:3px solid #22C55E;

display:flex;

justify-content:space-between;

align-items:center;

padding:0 24px;

color:white;

}

.left{

display:flex;

flex-direction:column;

}

.title{

font-size:20px;

font-weight:700;

}

.subtitle{

font-size:12px;

letter-spacing:3px;

color:#4ADE80;

margin-top:2px;

text-transform:uppercase;

}

.right{

text-align:right;

}

#clock{

font-size:24px;

font-weight:bold;

}

#date{

font-size:12px;

opacity:.8;

}

/* ================= CONTENT ================= */

iframe{

width:100%;

height:calc(100vh - 88px);

border:none;

display:block;

}

/* ================= FOOTER ================= */

footer{

height:30px;

background:#0F172A;

border-top:1px solid #334155;

display:flex;

justify-content:center;

align-items:center;

font-size:13px;

color:#E5E7EB;

}

.online{

color:#22C55E;

font-weight:bold;

}

</style>

</head>

<body>

<header>

<div class="left">

<div class="title">
Dashboard Monitoring DPUPKP Kabupaten Sleman
</div>

<div class="subtitle">
SIGAP MEMBANGUN SLEMAN
</div>

</div>

<div class="right">

<div id="clock"></div>

<div id="date"></div>

</div>

</header>

<iframe

id="slides"

src="https://docs.google.com/presentation/d/e/2PACX-XXXXXXXXXXXXXXXXXXXXXXXX/pub?start=true&loop=true&delayms=30000"

allowfullscreen>

</iframe>

<footer>

<span class="online">🟢 Dashboard Aktif</span>

&nbsp;&nbsp;|&nbsp;&nbsp;

Slide 30 Detik

&nbsp;&nbsp;|&nbsp;&nbsp;

Refresh Otomatis 15 Menit

</footer>

<script>

// ==================== JAM ====================

function updateClock(){

const now=new Date();

document.getElementById("clock").innerHTML=

now.toLocaleTimeString("id-ID",{

hour:"2-digit",

minute:"2-digit",

second:"2-digit"

})+" WIB";

document.getElementById("date").innerHTML=

now.toLocaleDateString("id-ID",{

weekday:"long",

day:"2-digit",

month:"long",

year:"numeric"

});

}

updateClock();

setInterval(updateClock,1000);

// ==================== REFRESH IFRAME ====================

function reloadSlides(){

const frame=document.getElementById("slides");

const base=frame.src.split("?")[0];

frame.src=base+"?start=true&loop=true&delayms=30000&t="+Date.now();

}

// setiap 15 menit
setInterval(reloadSlides,900000);

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Monitoring DPUPKP Kabupaten Sleman</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --header-height: clamp(48px,5.5vh,68px);
    --footer-height: clamp(24px,3vh,34px);
}

html,
body{
    width:100%;
    height:100dvh;
    overflow:hidden;
    font-family:"Segoe UI",Arial,sans-serif;
    background:#111827;
}

/* ================= HEADER ================= */

header{

    height:var(--header-height);

    background:#111827;

    border-bottom:3px solid #22C55E;

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:0 clamp(12px,2vw,28px);

    color:white;

}

.left{

    display:flex;

    flex-direction:column;

    justify-content:center;

}

.title{

    font-size:clamp(15px,1.6vw,24px);

    font-weight:700;

    line-height:1.15;

}

.subtitle{

    font-size:clamp(8px,.75vw,13px);

    letter-spacing:2px;

    color:#4ADE80;

    margin-top:2px;

}

.right{

    text-align:right;

}

#clock{

    font-size:clamp(18px,2vw,30px);

    font-weight:bold;

}

#date{

    font-size:clamp(9px,.8vw,13px);

    opacity:.8;

}

/* ================= CONTENT ================= */

iframe{

    display:block;

    width:100%;

    height:calc(100dvh - var(--header-height) - var(--footer-height));

    border:none;

    background:white;

}

/* ================= FOOTER ================= */

footer{

    height:var(--footer-height);

    background:#111827;

    border-top:1px solid #334155;

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:clamp(10px,.85vw,14px);

    color:white;

    white-space:nowrap;

    overflow:hidden;

    text-overflow:ellipsis;

    padding:0 10px;

}

.online{

    color:#22C55E;

    font-weight:bold;

}

/* ================= TABLET ================= */

@media (max-width:1024px){

    .title{
        font-size:18px;
    }

    #clock{
        font-size:22px;
    }

}

/* ================= HP ================= */

@media (max-width:768px){

    header{

        padding:0 12px;

    }

    .title{

        font-size:16px;

    }

    .subtitle{

        display:none;

    }

    #clock{

        font-size:18px;

    }

    #date{

        display:none;

    }

    footer{

        font-size:10px;

    }

}

/* ================= TV BESAR ================= */

@media (min-width:1920px){

    .title{

        font-size:28px;

    }

    .subtitle{

        font-size:14px;

    }

    #clock{

        font-size:34px;

    }

    #date{

        font-size:14px;

    }

    footer{

        font-size:15px;

    }

}

</style>

</head>

<body>

<header>

    <div class="left">

        <div class="title">
            Dashboard Monitoring DPUPKP Kabupaten Sleman
        </div>

        <div class="subtitle">
            SIGAP MEMBANGUN SLEMAN
        </div>

    </div>

    <div class="right">

        <div id="clock"></div>

        <div id="date"></div>

    </div>

</header>

<iframe
loading="eager"
src="https://docs.google.com/presentation/d/e/2PACX-1vRXPgQYuwiCNnzZnLwRpc8kwSAg6uKPUKReDhunjslbH2CAkMs7ttP_QdjsX-F-0l_pYELc5OK2PgiU/embed?start=true&loop=true&delayms=30000"
allowfullscreen>
</iframe>

<footer>

    <span class="online">🟢 Dashboard Aktif</span>

    &nbsp;&nbsp;|&nbsp;&nbsp;

    Slide 30 Detik

    &nbsp;&nbsp;|&nbsp;&nbsp;

    Refresh Otomatis 15 Menit

</footer>

<script>

function updateClock(){

    const now = new Date();

    document.getElementById("clock").innerHTML =
        now.toLocaleTimeString("id-ID") + " WIB";

    document.getElementById("date").innerHTML =
        now.toLocaleDateString("id-ID",{
            weekday:"long",
            day:"2-digit",
            month:"long",
            year:"numeric"
        });

}

updateClock();

setInterval(updateClock,1000);

// Refresh halaman setiap 15 menit
setTimeout(function(){

    location.reload();

},900000);

</script>

</body>
</html>

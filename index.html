<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Monitoring DPUPKP Kabupaten Sleman</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:"Segoe UI",Arial,sans-serif;
}

/* ================= FULLSCREEN SLIDE ================= */

#slides{

    position:fixed;

    top:0;
    left:0;

    width:100vw;
    height:100vh;

    border:none;

    z-index:1;

}

/* ================= JAM ================= */

.clock{

    position:fixed;

    top:20px;
    right:20px;

    padding:14px 18px;

    border-radius:18px;

    background:rgba(0,0,0,.25);

    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);

    color:white;

    text-align:right;

    z-index:9999;

    box-shadow:0 8px 25px rgba(0,0,0,.25);

}

#clock{

    font-size:32px;

    font-weight:700;

}

#date{

    margin-top:4px;

    font-size:14px;

    opacity:.9;

}

/* ================= STATUS ================= */

.status{

    position:fixed;

    bottom:20px;
    left:20px;

    padding:12px 18px;

    border-radius:16px;

    background:rgba(0,0,0,.25);

    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);

    color:white;

    font-size:15px;

    z-index:9999;

    display:flex;

    gap:12px;

    align-items:center;

}

.dot{

    width:10px;
    height:10px;

    background:#22C55E;

    border-radius:50%;

    animation:pulse 1.5s infinite;

}

@keyframes pulse{

0%{transform:scale(1);opacity:1;}

50%{transform:scale(1.5);opacity:.5;}

100%{transform:scale(1);opacity:1;}

}

/* ================= REFRESH ================= */

.refresh{

    position:fixed;

    bottom:20px;
    right:20px;

    padding:12px 18px;

    border-radius:16px;

    background:rgba(0,0,0,.25);

    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);

    color:white;

    font-size:15px;

    z-index:9999;

}

@media (max-width:768px){

#clock{

font-size:22px;

}

#date{

font-size:11px;

}

.status,
.refresh{

font-size:12px;

padding:10px 14px;

}

}

</style>

</head>

<body>

<iframe

id="slides"

loading="eager"

allowfullscreen

src="https://docs.google.com/presentation/d/e/2PACX-1vRXPgQYuwiCNnzZnLwRpc8kwSAg6uKPUKReDhunjslbH2CAkMs7ttP_QdjsX-F-0l_pYELc5OK2PgiU/embed?start=true&loop=true&delayms=30000">

</iframe>

<div class="clock">

<div id="clock"></div>

<div id="date"></div>

</div>

<div class="status">

<div class="dot"></div>

<div>Dashboard Aktif</div>

</div>

<div class="refresh">

Refresh:
<span id="countdown">15:00</span>

</div>

<script>

function updateClock(){

const now=new Date();

document.getElementById("clock").innerHTML=
now.toLocaleTimeString("id-ID")+" WIB";

document.getElementById("date").innerHTML=
now.toLocaleDateString("id-ID",{

weekday:"long",

day:"2-digit",

month:"long",

year:"numeric"

});

}

updateClock();

setInterval(updateClock,1000);

// ================= COUNTDOWN =================

let total=900;

setInterval(function(){

total--;

let m=Math.floor(total/60);

let s=total%60;

document.getElementById("countdown").innerHTML=

String(m).padStart(2,"0")+":"+

String(s).padStart(2,"0");

if(total<=0){

location.reload();

}

},1000);

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Monitoring DPUPKP</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:Segoe UI,Arial,sans-serif;
}

/* Slides */
iframe{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    border:none;
}

/* Panel informasi */
#info{
    position:fixed;
    top:18px;
    right:18px;

    background:rgba(0,0,0,.55);
    backdrop-filter:blur(8px);

    color:#fff;

    padding:15px 18px;

    border-radius:14px;

    z-index:999999;

    text-align:right;

    min-width:260px;

    box-shadow:0 8px 30px rgba(0,0,0,.35);

}

#jam{

    font-size:34px;

    font-weight:bold;

}

#tanggal{

    margin-top:5px;

    font-size:17px;

}

#status{

    margin-top:12px;

    font-size:16px;

}

#refresh{

    margin-top:8px;

    font-size:20px;

    color:#69ff9c;

    font-weight:bold;

}

#loading{

    display:none;

    position:fixed;

    left:0;

    top:0;

    width:100%;

    height:100%;

    background:rgba(0,0,0,.85);

    color:white;

    justify-content:center;

    align-items:center;

    font-size:42px;

    z-index:9999999;

}

</style>

</head>

<body>

<iframe

src="https://docs.google.com/presentation/d/1uuu0-0_GsJ3yf1GzLuAECwF34bQDxsrpIAGnk7NEa7c/embed?start=true&loop=true&delayms=30000"

allowfullscreen>

</iframe>

<div id="info">

<div id="jam"></div>

<div id="tanggal"></div>

<div id="status"></div>

<div id="refresh"></div>

</div>

<div id="loading">

Memperbarui Dashboard...

</div>

<script>

const REFRESH = 15 * 60;

let sisa = REFRESH;

function updateJam(){

const now = new Date();

document.getElementById("jam").innerHTML =
now.toLocaleTimeString("id-ID");

document.getElementById("tanggal").innerHTML =
now.toLocaleDateString("id-ID",{

weekday:"long",

day:"2-digit",

month:"long",

year:"numeric"

});

}

function updateStatus(){

document.getElementById("status").innerHTML =
navigator.onLine ?
"🟢 Online" :
"🔴 Offline";

}

function updateRefresh(){

const m = Math.floor(sisa/60);

const d = sisa%60;

document.getElementById("refresh").innerHTML =
"Refresh : "
+ String(m).padStart(2,'0')
+":"
+ String(d).padStart(2,'0');

if(sisa<=0){

document.getElementById("loading").style.display="flex";

setTimeout(function(){

location.reload();

},1500);

}

sisa--;

}

updateJam();

updateStatus();

updateRefresh();

setInterval(updateJam,1000);

setInterval(updateStatus,5000);

setInterval(updateRefresh,1000);

</script>

</body>
</html>

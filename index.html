<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Monitoring DPUPKP</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:"Segoe UI",Arial,sans-serif;
background:#111827;
}

/* ================= HEADER ================= */

header{

height:58px;

background:#1E293B;

color:white;

display:flex;

justify-content:space-between;

align-items:center;

padding:0 22px;

border-bottom:2px solid #22c55e;

}

.left{

display:flex;

flex-direction:column;

}

.title{

font-size:20px;

font-weight:700;

}

.subtitle{

font-size:12px;

letter-spacing:3px;

color:#4ADE80;

margin-top:2px;

text-transform:uppercase;

}

.right{

text-align:right;

}

#clock{

font-size:24px;

font-weight:bold;

}

#date{

font-size:12px;

opacity:.85;

}

/* ================= IFRAME ================= */

iframe{

display:block;

width:100%;

height:calc(100vh - 88px);

border:none;

}

/* ================= FOOTER ================= */

footer{

height:30px;

background:#1E293B;

display:flex;

justify-content:center;

align-items:center;

color:#E5E7EB;

font-size:13px;

border-top:1px solid #334155;

}

.online{

color:#4ADE80;

font-weight:bold;

}

</style>

</head>

<body>

<header>

<div class="left">

<div class="title">
Dashboard Monitoring DPUPKP Kabupaten Sleman
</div>

<div class="subtitle">
SIGAP MEMBANGUN SLEMAN
</div>

</div>

<div class="right">

<div id="clock"></div>

<div id="date"></div>

</div>

</header>

<iframe

src="https://docs.google.com/presentation/d/1uuu0-0_GsJ3yf1GzLuAECwF34bQDxsrpIAGnk7NEa7c/embed?start=true&loop=true&delayms=30000"

allowfullscreen>

</iframe>

<footer>

<span class="online">🟢 Dashboard Aktif</span>

&nbsp;&nbsp;|&nbsp;&nbsp;

Slide 30 Detik

&nbsp;&nbsp;|&nbsp;&nbsp;

Refresh Otomatis 15 Menit

</footer>

<script>

function updateClock(){

const now=new Date();

document.getElementById("clock").innerHTML=

now.toLocaleTimeString('id-ID',{

hour:'2-digit',

minute:'2-digit',

second:'2-digit'

})+" WIB";

document.getElementById("date").innerHTML=

now.toLocaleDateString('id-ID',{

weekday:'long',

day:'2-digit',

month:'long',

year:'numeric'

});

}

updateClock();

setInterval(updateClock,1000);

// Refresh otomatis 15 menit
setInterval(function(){

location.reload();

},15*60*1000);

</script>

</body>
</html>

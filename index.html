<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dashboard Monitoring DPUPKP</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:Segoe UI,Arial,sans-serif;
background:#111;
}

/* Header */

header{

height:42px;

background:#1f2937;

color:white;

display:flex;

justify-content:space-between;

align-items:center;

padding:0 18px;

font-size:17px;

font-weight:600;

}

/* Footer */

footer{

height:28px;

background:#1f2937;

color:#ddd;

display:flex;

align-items:center;

padding:0 18px;

font-size:13px;

}

/* Slide */

iframe{

width:100%;

height:calc(100vh - 70px);

border:none;

display:block;

}

.status{

color:#4ade80;

font-weight:bold;

}

</style>

</head>

<body>

<header>

<div>

Dashboard Monitoring DPUPKP Kabupaten Sleman

</div>

<div id="tanggal"></div>

</header>

<iframe

src="https://docs.google.com/presentation/d/1uuu0-0_GsJ3yf1GzLuAECwF34bQDxsrpIAGnk7NEa7c/embed?start=true&loop=true&delayms=30000"

allowfullscreen>

</iframe>

<footer>

<span class="status">🟢 Dashboard Aktif</span>

&nbsp;&nbsp;•&nbsp;&nbsp;

Refresh otomatis setiap 15 menit

</footer>

<script>

function updateTanggal(){

const now=new Date();

document.getElementById("tanggal").innerHTML=

now.toLocaleDateString('id-ID',{

weekday:'long',

day:'2-digit',

month:'long',

year:'numeric'

});

}

updateTanggal();

setInterval(function(){

location.reload();

},15*60*1000);

</script>

</body>

</html>

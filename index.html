<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Monitoring DPUPKP Kabupaten Sleman</title>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:"Segoe UI",Arial,sans-serif;
background:#0f172a;
}

/* HEADER */

header{

height:60px;

background:#111827;

border-bottom:3px solid #22c55e;

display:flex;

justify-content:space-between;

align-items:center;

padding:0 24px;

color:white;

}

.left{

display:flex;

flex-direction:column;

}

.title{

font-size:20px;

font-weight:700;

}

.subtitle{

font-size:12px;

letter-spacing:3px;

color:#4ade80;

text-transform:uppercase;

margin-top:3px;

}

.right{

text-align:right;

}

#clock{

font-size:24px;

font-weight:bold;

}

#date{

font-size:12px;

opacity:.8;

margin-top:2px;

}

/* CONTENT */

iframe{

display:block;

width:100%;

height:calc(100vh - 92px);

border:none;

background:white;

}

/* FOOTER */

footer{

height:32px;

background:#111827;

border-top:1px solid #334155;

display:flex;

justify-content:center;

align-items:center;

color:#e5e7eb;

font-size:13px;

}

.online{

color:#22c55e;

font-weight:bold;

}

</style>

</head>

<body>

<header>

<div class="left">

<div class="title">
Dashboard Monitoring DPUPKP Kabupaten Sleman
</div>

<div class="subtitle">
SIGAP MEMBANGUN SLEMAN
</div>

</div>

<div class="right">

<div id="clock"></div>

<div id="date"></div>

</div>

</header>

<iframe

id="slides"

src="https://docs.google.com/presentation/d/e/2PACX-1vRXPgQYuwiCNnzZnLwRpc8kwSAg6uKPUKReDhunjslbH2CAkMs7ttP_QdjsX-F-0l_pYELc5OK2PgiU/pub?start=false&loop=true&delayms=30000"

allowfullscreen>

</iframe>

<footer>

<span class="online">🟢 Dashboard Aktif</span>

&nbsp;&nbsp;|&nbsp;&nbsp;

Slide berganti setiap 30 detik

&nbsp;&nbsp;|&nbsp;&nbsp;

Refresh otomatis setiap 15 menit

</footer>

<script>

// =========================
// JAM REALTIME
// =========================

function updateClock(){

const now = new Date();

document.getElementById("clock").innerHTML =
now.toLocaleTimeString("id-ID") + " WIB";

document.getElementById("date").innerHTML =
now.toLocaleDateString("id-ID",{

weekday:"long",

day:"2-digit",

month:"long",

year:"numeric"

});

}

updateClock();

setInterval(updateClock,1000);

// =========================
// REFRESH HALAMAN
// =========================

setTimeout(function(){

location.reload(true);

},15*60*1000);

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dashboard Monitoring DPUPKP</title>

<style>

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:Segoe UI,Arial,sans-serif;
}

iframe{
position:absolute;
left:0;
top:0;
width:100%;
height:100%;
border:none;
}

/* Panel kanan atas */
#panel{
position:fixed;
top:20px;
right:20px;
background:rgba(0,0,0,.55);
color:white;
padding:15px 18px;
border-radius:14px;
backdrop-filter:blur(8px);
z-index:999;
min-width:250px;
box-shadow:0 5px 15px rgba(0,0,0,.4);
}

#clock{
font-size:34px;
font-weight:bold;
}

#date{
margin-top:4px;
font-size:18px;
opacity:.9;
}

#status{
margin-top:12px;
font-size:17px;
}

#countdown{
margin-top:10px;
font-size:22px;
font-weight:bold;
color:#00ff99;
}

#loading{
display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,.85);
color:white;
font-size:40px;
font-weight:bold;
justify-content:center;
align-items:center;
z-index:9999;
}

</style>

</head>

<body>

<iframe
src="https://docs.google.com/presentation/d/1uuu0-0_GsJ3yf1GzLuAECwF34bQDxsrpIAGnk7NEa7c/embed?start=true&loop=true&delayms=30000"
allowfullscreen>
</iframe>

<div id="panel">

<div id="clock"></div>

<div id="date"></div>

<div id="status"></div>

<div id="countdown"></div>

</div>

<div id="loading">
Memperbarui Dashboard...
</div>

<script>

const REFRESH=15*60;

let sisa=REFRESH;

function updateClock(){

let now=new Date();

document.getElementById("clock").innerHTML=
now.toLocaleTimeString('id-ID');

document.getElementById("date").innerHTML=
now.toLocaleDateString('id-ID',{
weekday:'long',
day:'2-digit',
month:'long',
year:'numeric'
});

}

function updateStatus(){

if(navigator.onLine){

document.getElementById("status").innerHTML="🟢 Online";

}else{

document.getElementById("status").innerHTML="🔴 Offline";

}

}

function updateCountdown(){

let m=Math.floor(sisa/60);

let d=sisa%60;

document.getElementById("countdown").innerHTML=
"Refresh : "+
String(m).padStart(2,'0')+
":"+
String(d).padStart(2,'0');

if(sisa<=0){

document.getElementById("loading").style.display="flex";

setTimeout(function(){

location.reload();

},1500);

}

sisa--;

}

setInterval(updateClock,1000);

setInterval(updateCountdown,1000);

setInterval(updateStatus,5000);

updateClock();
updateStatus();
updateCountdown();

</script>

</body>
</html>
